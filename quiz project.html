<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9966,#ff5e62);
}

.quiz{
    width:400px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

#question{
    font-size:20px;
    font-weight:bold;
    margin-bottom:15px;
}

.answer{
    background:#eee;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    cursor:pointer;
}

.answer:hover{
    background:#ddd;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#ff5e62;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#e0484d;
}

#score{
    text-align:center;
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="quiz">
    <h1>Quiz Game</h1>

    <div id="question"></div>

    <div class="answer" onclick="checkAnswer(0)" id="a"></div>
    <div class="answer" onclick="checkAnswer(1)" id="b"></div>
    <div class="answer" onclick="checkAnswer(2)" id="c"></div>
    <div class="answer" onclick="checkAnswer(3)" id="d"></div>

    <button onclick="next()">Next</button>

    <div id="score"></div>
</div>


<script>
let questions=[
{
q:"Which language is used to create a webpage?",
a:["HTML","CSS","Python","Java"],
correct:0
},
{
q:"Which language is used for styling webpages?",
a:["C++","CSS","Java","PHP"],
correct:1
},
{
q:"Which planet is called the Red Planet?",
a:["Earth","Mars","Jupiter","Venus"],
correct:1
},
{
q:"How many days are there in a week?",
a:["5","6","7","8"],
correct:2
}
];

let current=0;
let marks=0;

function loadQuiz(){
    document.getElementById("question").innerHTML=
    questions[current].q;

    document.getElementById("a").innerHTML=
    questions[current].a[0];
    document.getElementById("b").innerHTML=
    questions[current].a[1];
    document.getElementById("c").innerHTML=
    questions[current].a[2];
    document.getElementById("d").innerHTML=
    questions[current].a[3];
}

function checkAnswer(answer){
    if(answer==questions[current].correct){
        marks++;
    }
}

function next(){
    current++;

    if(current<questions.length){
        loadQuiz();
    }
    else{
        document.querySelector(".quiz").innerHTML=
        "<h1>Quiz Finished</h1>"+
        "<h2>Your Score: "+marks+"/"+questions.length+"</h2>"+
        "<button onclick='location.reload()'>Restart</button>";
    }
}

loadQuiz();
</script>

</body>
</html>
